<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Happy Birthday Vanaja - A special celebration page">
    <title>Happy Birthday Vanaja!</title>
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts for modern typography -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="img-container">
                <!-- Replace this emoji with an img tag later: <img src="images/vanaja.jpg" alt="Vanaja"> -->
                <div class="placeholder-img" id="profileImage">🎂</div>
            </div>
            
            <h1>Happy Birthday, <span class="highlight">Vanaja!</span></h1>
            
            <p class="message">
                Wishing you a fantastic day filled with joy, laughter, and lots of cake! 
                May all your dreams come true this year.
            </p>
            
            <button id="celebrateBtn">Let's Celebrate! 🎉</button>
        </div>
        
        <!-- Container for confetti animation -->
        <div class="confetti-container" id="confetti-container"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
