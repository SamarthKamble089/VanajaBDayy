<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Happy Birthday Vanaja - A special celebration page">
    <title>Happy Birthday Vanaja!</title>
    <!-- Google Fonts for modern typography -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <!-- Link to external CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- LOGIN PAGE -->
    <div id="loginPage" class="page active">
        <div class="container">
            <div class="card">
                <div class="lock-icon">🔒</div>
                <h2>Enter the 8 digit code to unlock the chat!!</h2>
                <p class="message" style="margin-bottom: 10px;">Enter the special PIN to unlock.</p>

                <div class="pin-input-group">
                    <input type="password" id="pinInput" class="pin-input" placeholder="••••" maxlength="10">
                    <div id="errorMessage" class="error-message">Incorrect PIN, try again!</div>
                </div>

                <button id="unlockBtn">Unlock 🔓</button>
            </div>
        </div>
    </div>

    <!-- BIRTHDAY PAGE -->
    <div id="birthdayPage" class="page hidden">
        <div class="container">
            <div class="card">
                <div class="img-container">
                    <!-- Replace this emoji with an img tag later: <img src="images/vanaja.jpg" alt="Vanaja"> -->
                    <div class="placeholder-img" id="profileImage">🎂</div>
                </div>

                <h1>Happy Birthday, <span class="highlight">Vanaja!</span></h1>

                <p class="message">
                    Wishing you a fantastic day filled with joy, laughter, and lots of cake!
                    May all your dreams come true this year.
                </p>

                <button id="celebrateBtn">Let's Celebrate! 🎉</button>
            </div>

            <!-- Container for confetti animation -->
            <div class="confetti-container" id="confetti-container"></div>
        </div>
    </div>

    <!-- Link to external JavaScript -->
    <script src="script.js"></script>
</body>

</html>
